# Para desenvolvimento local e referência de deploy no Dokploy.
# No Dokploy, configure o serviço "app" via Git e o Postgres como recurso gerenciado.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cetea
      POSTGRES_PASSWORD: cetea
      POSTGRES_DB: cetea
    volumes:
      - cetea_db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cetea"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cetea:cetea@db:5432/cetea?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  cetea_db:
